<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おつきあいノート">
<title>おつきあいノート</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --ver:#c0392b; --verD:#8b2218; --verL:#e8a090;
  --verLL:#fce8e4; --washi:#faf7f2; --washiD:#f5ede6;
  --text:#2c1a18; --textS:#9a8a88;
  --font-serif: 'Hiragino Mincho ProN','Yu Mincho','YuMincho',Georgia,serif;
  --font-sans: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--washi);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--verL);border-radius:3px}
input,textarea,button{font-family:var(--font-sans)}
input:focus,textarea:focus{outline:none;background:#fff5f3!important}
button{cursor:pointer}
table{border-collapse:collapse;width:100%}
#app-header{
  background:var(--verD);color:white;padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(139,34,24,.4);
}
#app-header h1{font-family:var(--font-serif);font-size:17px;letter-spacing:.06em;flex:1}
#app-header .sub{font-size:9px;opacity:.6;margin-top:1px}
.hbtn{border:1px solid rgba(255,255,255,.35);border-radius:5px;padding:5px 11px;font-size:11px;font-weight:500}
.hbtn-solid{background:var(--ver);color:white;border-color:transparent}
.hbtn-ghost{background:rgba(255,255,255,.12);color:white}
.hbtn-back{background:none;color:white;font-size:12px;padding:4px 8px}
#view-cover{
  background:linear-gradient(155deg,var(--verD) 0%,var(--ver) 50%,var(--verLL) 100%);
  min-height:calc(100vh - 46px);padding:20px 16px 50px;
}
#search-wrap{position:relative;margin-bottom:16px}
#search-input{
  width:100%;background:rgba(255,255,255,.96);
  border:1px solid var(--verL);border-radius:8px;
  padding:10px 14px;font-size:13px;color:var(--text);outline:none;
}
#search-results{
  position:absolute;top:100%;left:0;right:0;background:white;
  border-radius:8px;border:1px solid var(--verL);margin-top:4px;
  overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:50;display:none;
}
.sr-row{padding:9px 14px;border-bottom:1px solid var(--verLL);display:flex;gap:10px;align-items:center;cursor:pointer}
.sr-row:hover{background:var(--verLL)}
.sr-kana{color:var(--ver);font-family:var(--font-serif);font-size:12px;min-width:42px;font-weight:600}
.sr-name{font-size:14px;font-family:var(--font-serif);font-weight:600}
.sr-furi{font-size:11px;color:var(--textS)}
#gojuon-grid{display:flex;flex-direction:column;gap:6px}
.gojuon-row{display:flex;gap:6px}
.kana-btn{
  background:rgba(255,255,255,.88);color:var(--verD);
  border:1.5px solid var(--verL);border-radius:6px;
  padding:8px 0;width:54px;
  font-family:var(--font-serif);font-size:16px;font-weight:600;
  transition:all .12s;
}
.kana-btn.has-data{background:rgba(255,255,255,.98);border-color:var(--ver);box-shadow:0 2px 6px rgba(192,57,43,.25)}
.kana-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(192,57,43,.3)}
.kana-header{background:var(--ver);color:white;padding:12px 16px 8px}
.kana-header h2{font-family:var(--font-serif);font-size:22px;margin-bottom:6px}
.kana-nav{display:flex;justify-content:space-between;align-items:center;background:var(--verLL);border-radius:6px;padding:6px 12px}
.nav-txt{font-family:var(--font-serif);font-size:11px;color:var(--textS)}
.nav-btn-sm{background:none;border:none;color:var(--verD);font-size:12px;padding:2px 4px}
.person-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px}
.person-card{
  background:var(--washiD);border:1px solid var(--verL);
  border-left:4px solid var(--ver);border-radius:6px;
  padding:9px 10px;cursor:pointer;min-height:52px;transition:all .12s;
}
.person-card.filled{background:var(--verLL);border-color:var(--ver)}
.person-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(192,57,43,.15)}
.card-num{font-size:10px;color:var(--textS);font-family:var(--font-serif)}
.card-name{font-size:13px;font-family:var(--font-serif);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name.empty{font-size:11px;color:var(--textS);font-weight:400}
.card-furi{font-size:9px;color:var(--textS);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-nav{
  background:var(--verLL);border-bottom:1px solid var(--verL);
  padding:7px 14px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:46px;z-index:50;
}
.person-nav-label{font-family:var(--font-serif);font-size:14px;color:var(--verD);font-weight:600}
.profile-wrap{padding-bottom:90px}
.profile-sec{margin:0 10px 10px;background:white;border-radius:8px;overflow:hidden;border:1px solid var(--verL)}
.sec-title{background:var(--ver);color:white;font-family:var(--font-serif);font-size:11px;padding:5px 10px}
.lbl{background:var(--verLL);color:var(--verD);font-family:var(--font-serif);padding:0 7px;font-size:10px;white-space:nowrap;text-align:center;line-height:1.35;border:1px solid var(--verL);vertical-align:middle}
.td{border:1px solid var(--verL);vertical-align:middle}
.fi{width:100%;border:none;background:transparent;padding:7px 8px;font-size:12px;color:var(--text)}
.fi-sm{width:100%;border:none;background:transparent;padding:6px 8px;font-size:11px;color:var(--text)}
.fi:focus,.fi-sm:focus{background:#fff5f3!important;outline:none}
.free-memo{width:100%;min-height:190px;border:none;background:transparent;padding:7px 8px;font-size:11px;color:var(--text);resize:none}
.save-btn{
  position:fixed;bottom:22px;right:18px;background:var(--ver);color:white;
  border:none;border-radius:50px;padding:13px 28px;font-size:14px;
  font-family:var(--font-serif);box-shadow:0 4px 18px rgba(192,57,43,.5);
  z-index:200;display:none;transition:all .15s;
}
.save-btn:hover{background:var(--verD);transform:translateY(-2px)}
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--verD);color:white;padding:9px 20px;border-radius:24px;
  font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.25);
  z-index:500;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1}
#dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:600;padding:20px}
#dialog-box{background:white;border-radius:12px;padding:24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3)}
#dialog-msg{font-family:var(--font-serif);font-size:14px;color:var(--text);margin-bottom:16px;white-space:pre-wrap;line-height:1.7}
#dialog-btns{display:flex;gap:10px;justify-content:flex-end}
.dbtn{border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer}
.dbtn-cancel{border:1px solid var(--verL);background:white;color:var(--textS)}
.dbtn-ok{background:var(--ver);color:white;border:none;font-weight:600}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app-header">
  <button id="btn-back" class="hbtn hbtn-back hidden">◀ 戻る</button>
  <div style="flex:1">
    <div id="header-title" style="font-family:var(--font-serif);font-size:17px;letter-spacing:.06em">おつきあいノート</div>
    <div class="sub">Address Book · 五十音順</div>
  </div>
  <button id="btn-export" class="hbtn hbtn-solid">書き出し</button>
  <button id="btn-import-trigger" class="hbtn hbtn-ghost">読み込み</button>
  <input id="file-input" type="file" accept=".json" style="display:none">
</div>
<div id="view-cover">
  <div id="search-wrap">
    <input id="search-input" placeholder="名前・フリガナで検索…">
    <div id="search-results"></div>
  </div>
  <div id="gojuon-grid"></div>
  <div style="margin-top:20px;font-size:10px;color:rgba(255,255,255,.4);text-align:center">
    データ入力済みの音はハイライト表示されます
  </div>
</div>
<div id="view-kana" class="hidden">
  <div class="kana-header">
    <h2 id="kana-title"></h2>
    <div class="kana-nav">
      <button id="kana-prev" class="nav-btn-sm"></button>
      <span id="kana-pos" class="nav-txt"></span>
      <button id="kana-next" class="nav-btn-sm"></button>
    </div>
  </div>
  <div id="person-grid" class="person-grid"></div>
</div>
<div id="view-person" class="hidden">
  <div class="person-nav">
    <button id="p-prev" class="nav-btn-sm"></button>
    <span id="p-label" class="person-nav-label"></span>
    <button id="p-next" class="nav-btn-sm"></button>
  </div>
  <div class="profile-wrap" id="profile-content"></div>
  <button id="save-btn" class="save-btn">保存する ✓</button>
</div>
<div id="toast"></div>
<div id="dialog-overlay">
  <div id="dialog-box">
    <div id="dialog-msg"></div>
    <div id="dialog-btns">
      <button class="dbtn dbtn-cancel" id="dialog-cancel">キャンセル</button>
      <button class="dbtn dbtn-ok" id="dialog-ok">読み込む</button>
    </div>
  </div>
</div>

<script>
// ========== IndexedDB ==========
const DB_NAME = 'OtsukiaiDB';
const DB_VER = 1;
const STORE = 'persons';
let idb = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { idb = e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = idb.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => {
      const map = {};
      req.result.forEach(r => { map[r.id] = r.data; });
      res(map);
    };
    req.onerror = () => rej(req.error);
  });
}

function dbPut(id, data) {
  return new Promise((res, rej) => {
    const tx = idb.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put({ id, data });
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbPutAll(map) {
  return new Promise((res, rej) => {
    const tx = idb.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    Object.entries(map).forEach(([id, data]) => store.put({ id, data }));
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

function dbClear() {
  return new Promise((res, rej) => {
    const tx = idb.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).clear();
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ========== アプリ本体 ==========
const GOJUON_ROWS = [
  ["あ","い","う","え","お"],
  ["か","き","く","け","こ"],
  ["さ","し","す","せ","そ"],
  ["た","ち","つ","て","と"],
  ["な","に","ぬ","ね","の"],
  ["は","ひ","ふ","へ","ほ"],
  ["ま","み","む","め","も"],
  ["や","ゆ","よ"],
  ["ら","り","る","れ","ろ"],
  ["わ","を","ん"],
];
const GOJUON_ALL = GOJUON_ROWS.flat();
const LARGE_KANA = new Set(["か","き","し"]);
const getCount = k => LARGE_KANA.has(k) ? 90 : 30;
const pkey = (k,n) => `${k}_${n}`;
const emptyPerson = () => ({
  furigana:"", name:"", yobina:"", blood:"",
  tel:"", mobile:"", birthday:"",
  line:"", twitter:"", instagram:"",
  mobile_mail:"", email:"",
  address1:"", address2:"", station:"",
  kara:"", birthplace:"", emergency:"",
  food_like:"", food_dislike:"", allergy:"", memo:"",
  family:[{name:"",kara:"",note:"",fmemo:""},{name:"",kara:"",note:"",fmemo:""},{name:"",kara:"",note:"",fmemo:""},{name:"",kara:"",note:"",fmemo:""}],
  memories:Array.from({length:10},()=>({date:"",note:""})),
  free_memo:"",
});

let DB = {};
let curKana = null;
let curN = null;
let curPerson = null;
let dirty = false;

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function showView(name){
  ["cover","kana","person"].forEach(v=>{
    document.getElementById(`view-${v}`).classList.toggle("hidden", v!==name);
  });
  document.getElementById("btn-back").classList.toggle("hidden", name==="cover");
}

function hasData(k){
  for(let n=1;n<=getCount(k);n++){
    const p=DB[pkey(k,n)];
    if(p?.name||p?.furigana) return true;
  }
  return false;
}

function getPerson(k,n){
  return Object.assign(emptyPerson(), DB[pkey(k,n)]||{});
}

function buildCover(){
  const grid = document.getElementById("gojuon-grid");
  grid.innerHTML="";
  GOJUON_ROWS.forEach(row=>{
    const div = document.createElement("div");
    div.className = "gojuon-row";
    row.forEach(k=>{
      const btn = document.createElement("button");
      btn.className = "kana-btn" + (hasData(k)?" has-data":"");
      btn.textContent = k;
      btn.onclick = ()=>openKana(k);
      div.appendChild(btn);
    });
    grid.appendChild(div);
  });
}

document.getElementById("search-input").addEventListener("input", function(){
  const q = this.value.trim();
  const box = document.getElementById("search-results");
  if(!q){ box.style.display="none"; return; }
  const res = [];
  GOJUON_ALL.forEach(k=>{
    for(let n=1;n<=getCount(k);n++){
      const p=DB[pkey(k,n)];
      if(p&&((p.name||"").includes(q)||(p.furigana||"").includes(q)||(p.yobina||"").includes(q)))
        res.push({k,n,p});
    }
  });
  if(!res.length){box.style.display="none";return;}
  box.innerHTML="";
  res.forEach(({k,n,p})=>{
    const row=document.createElement("div");
    row.className="sr-row";
    row.innerHTML=`<span class="sr-kana">${k}-${n}</span><span class="sr-name">${p.name||""}</span><span class="sr-furi">${p.furigana||""}</span>`;
    row.onclick=()=>{openPerson(k,n);document.getElementById("search-input").value="";box.style.display="none";};
    box.appendChild(row);
  });
  box.style.display="block";
});

document.addEventListener("click",e=>{
  if(!document.getElementById("search-wrap").contains(e.target))
    document.getElementById("search-results").style.display="none";
});

function openKana(k){
  curKana=k;
  showView("kana");
  document.getElementById("header-title").textContent=`${k}のおつきあい`;
  buildKanaList(k);
}

function buildKanaList(k){
  const count=getCount(k);
  const ki=GOJUON_ALL.indexOf(k);
  const prev=ki>0?GOJUON_ALL[ki-1]:null;
  const next=ki<GOJUON_ALL.length-1?GOJUON_ALL[ki+1]:null;
  document.getElementById("kana-title").textContent=`${k}のおつきあい（${count}名分）`;
  document.getElementById("kana-pos").textContent=`${ki+1} / ${GOJUON_ALL.length}`;
  const pp=document.getElementById("kana-prev");
  pp.textContent=prev?`◀ ${prev}`:""; pp.onclick=prev?()=>openKana(prev):null;
  const np=document.getElementById("kana-next");
  np.textContent=next?`${next} ▶`:""; np.onclick=next?()=>openKana(next):null;
  const grid=document.getElementById("person-grid");
  grid.innerHTML="";
  for(let n=1;n<=count;n++){
    const p=DB[pkey(k,n)];
    const nm=p?.name||"";
    const fr=p?.furigana||"";
    const card=document.createElement("div");
    card.className="person-card"+(nm?" filled":"");
    card.innerHTML=`<div class="card-num">${k}-${n}</div>`
      +`<div class="card-name${nm?"":" empty"}">${nm||"（空欄）"}</div>`
      +(fr?`<div class="card-furi">${fr}</div>`:"");
    card.onclick=()=>openPerson(k,n);
    grid.appendChild(card);
  }
}

function openPerson(k,n){
  if(dirty&&curKana&&curN){ savePerson(false); }
  curKana=k; curN=n;
  curPerson=getPerson(k,n);
  dirty=false;
  showView("person");
  document.getElementById("header-title").textContent=`${k}-${n}`;
  buildProfile();
  updatePersonNav();
  document.getElementById("save-btn").style.display="none";
}

function updatePersonNav(){
  const max=getCount(curKana);
  document.getElementById("p-label").textContent=`${curKana}-${curN}`;
  const pp=document.getElementById("p-prev");
  pp.textContent=curN>1?`◀ ${curKana}-${curN-1}`:"";
  pp.onclick=curN>1?()=>{saveThenNav(curN-1)}:null;
  const np=document.getElementById("p-next");
  np.textContent=curN<max?`${curKana}-${curN+1} ▶`:"";
  np.onclick=curN<max?()=>{saveThenNav(curN+1)}:null;
}

function saveThenNav(nextN){
  if(dirty) savePerson(false);
  curN=nextN;
  curPerson=getPerson(curKana,nextN);
  dirty=false;
  buildProfile();
  updatePersonNav();
  document.getElementById("save-btn").style.display="none";
  window.scrollTo(0,0);
}

function markDirty(){
  dirty=true;
  document.getElementById("save-btn").style.display="block";
}

async function savePerson(toast=true){
  DB[pkey(curKana,curN)] = JSON.parse(JSON.stringify(curPerson));
  dirty=false;
  document.getElementById("save-btn").style.display="none";
  await dbPut(pkey(curKana,curN), curPerson);
  if(toast) showToast("保存しました ✓");
}

function buildProfile(){
  const p=curPerson;
  const content=document.getElementById("profile-content");
  const fi=(key,ph="",cls="fi")=>`<input class="${cls}" data-key="${key}" value="${esc(p[key]||"")}" placeholder="${ph}">`;
  const rows=[
    `<tr><td class="lbl">フリガナ</td><td class="td">${fi("furigana")}</td><td class="lbl">呼び名<br>アドレス帳登録名</td><td class="td" style="width:90px">${fi("yobina")}</td></tr>`,
    `<tr><td class="lbl">名　前</td><td class="td">${fi("name")}</td><td class="lbl">血液型</td><td class="td">${fi("blood")}</td></tr>`,
    `<tr><td class="lbl">電　話</td><td class="td">${fi("tel")}</td><td class="lbl">携帯電話</td><td class="td">${fi("mobile")}</td></tr>`,
    `<tr><td class="lbl">生年月日</td><td class="td" colspan="3">${fi("birthday","例：1990年1月1日")}</td></tr>`,
    `<tr><td class="lbl">LINE</td><td class="td">${fi("line","LINEアカウント")}</td><td class="lbl">X (Twitter)</td><td class="td">${fi("twitter","@ユーザー名")}</td></tr>`,
    `<tr><td class="lbl">Instagram</td><td class="td" colspan="3">${fi("instagram","@ユーザー名")}</td></tr>`,
    `<tr><td class="lbl">携帯メール<br>アドレス</td><td class="td" colspan="3">${fi("mobile_mail")}</td></tr>`,
    `<tr><td class="lbl">e-mail</td><td class="td" colspan="3">${fi("email")}</td></tr>`,
    `<tr><td class="lbl">住　所</td><td class="td" colspan="2"><input class="fi" data-key="address1" value="${esc(p.address1||"")}" placeholder="〒 郵便番号・住所1行目" style="border-bottom:1px solid var(--verL)"><input class="fi" data-key="address2" value="${esc(p.address2||"")}" placeholder="住所2行目"></td><td class="td" style="width:90px;padding:0;vertical-align:top"><div class="lbl" style="display:block;padding:4px 6px;border-bottom:1px solid var(--verL);border:none;text-align:center">最寄り駅</div>${fi("station","駅名")}</td></tr>`,
    `<tr><td class="lbl">どんな<br>間　柄</td><td class="td">${fi("kara")}</td><td class="lbl">出身地<br>など</td><td class="td">${fi("birthplace")}</td></tr>`,
    `<tr><td class="lbl">もしもの<br>時の連絡</td><td class="td" colspan="3">${fi("emergency","入院時・葬儀時など")}</td></tr>`,
    `<tr><td class="lbl">食べ物の<br>好み</td><td class="td">${fi("food_like","好きなもの")}</td><td class="lbl">苦手なもの</td><td class="td">${fi("food_dislike")}</td></tr>`,
    `<tr><td class="lbl">アレルギー</td><td class="td">${fi("allergy")}</td><td class="lbl">メモ<br>(趣味など)</td><td class="td">${fi("memo")}</td></tr>`,
  ];
  const famRows=p.family.map((f,i)=>`<tr><td class="td"><input class="fi fam" data-fi="${i}" data-fk="name" value="${esc(f.name||"")}"></td><td class="td"><input class="fi fam" data-fi="${i}" data-fk="kara" value="${esc(f.kara||"")}"></td><td class="td"><input class="fi fam" data-fi="${i}" data-fk="note" value="${esc(f.note||"")}"></td><td class="td"><input class="fi fam" data-fi="${i}" data-fk="fmemo" value="${esc(f.fmemo||"")}"></td></tr>`).join("");
  const memRows=p.memories.map((m,i)=>`<tr><td class="td"><input class="fi-sm mem" data-mi="${i}" data-mk="date" value="${esc(m.date||"")}"></td><td class="td"><input class="fi-sm mem" data-mi="${i}" data-mk="note" value="${esc(m.note||"")}"></td>${i===0?`<td class="td" rowspan="10"><textarea class="free-memo" id="free-memo-ta">${esc(p.free_memo||"")}</textarea></td>`:""}</tr>`).join("");
  content.innerHTML=`<div class="profile-sec"><div class="sec-title">プロフィール</div><table><tbody>${rows.join("")}</tbody></table></div><div class="profile-sec"><div class="sec-title">家族構成など</div><table><thead><tr><td class="lbl" style="padding:5px 6px">名前（ヨミガナ）</td><td class="lbl" style="padding:5px 6px">間柄</td><td class="lbl" style="padding:5px 6px">備考（誕生日など）</td><td class="lbl" style="padding:5px 6px">メモ</td></tr></thead><tbody>${famRows}</tbody></table></div><div class="profile-sec"><div class="sec-title">覚えておきたいことメモ</div><table><thead><tr><td class="lbl" style="width:80px">日時</td><td class="lbl">メモ</td><td class="lbl" style="width:38%">フリーメモ</td></tr></thead><tbody>${memRows}</tbody></table></div>`;
  content.querySelectorAll("input[data-key]").forEach(el=>{
    el.addEventListener("input",()=>{ curPerson[el.dataset.key]=el.value; markDirty(); });
  });
  content.querySelectorAll(".fam").forEach(el=>{
    el.addEventListener("input",()=>{ curPerson.family[+el.dataset.fi][el.dataset.fk]=el.value; markDirty(); });
  });
  content.querySelectorAll(".mem").forEach(el=>{
    el.addEventListener("input",()=>{ curPerson.memories[+el.dataset.mi][el.dataset.mk]=el.value; markDirty(); });
  });
  const fmta=document.getElementById("free-memo-ta");
  if(fmta) fmta.addEventListener("input",()=>{ curPerson.free_memo=fmta.value; markDirty(); });
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

document.getElementById("btn-back").onclick=()=>{
  if(dirty&&curKana&&curN) savePerson(false);
  const cur=["cover","kana","person"].find(v=>!document.getElementById(`view-${v}`).classList.contains("hidden"));
  if(cur==="person"){ showView("kana"); document.getElementById("header-title").textContent=`${curKana}のおつきあい`; buildKanaList(curKana); }
  else if(cur==="kana"){ showView("cover"); document.getElementById("header-title").textContent="おつきあいノート"; buildCover(); }
};

document.getElementById("save-btn").onclick=()=>savePerson(true);

document.getElementById("btn-export").onclick=()=>{
  const json=JSON.stringify({version:"1.0",exported:new Date().toISOString(),data:DB},null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`otsukiai_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast("JSONを書き出しました");
};

document.getElementById("btn-import-trigger").onclick=()=>document.getElementById("file-input").click();
document.getElementById("file-input").addEventListener("change",function(){
  const file=this.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      const incoming=parsed.data||parsed;
      showDialog(`「${file.name}」を読み込みます。\n現在のデータは上書きされます。よろしいですか？`,
        async ()=>{
          DB=incoming;
          await dbClear();
          await dbPutAll(incoming);
          buildCover();
          showToast("読み込みました ✓");
        });
    }catch(e){ showToast("読み込みエラー：正しいJSONファイルを選んでください"); }
  };
  reader.readAsText(file);
  this.value="";
});

let dialogOkFn=null;
function showDialog(msg,onOk){
  dialogOkFn=onOk;
  document.getElementById("dialog-msg").textContent=msg;
  document.getElementById("dialog-overlay").style.display="flex";
}
document.getElementById("dialog-cancel").onclick=()=>{ document.getElementById("dialog-overlay").style.display="none"; };
document.getElementById("dialog-ok").onclick=()=>{ document.getElementById("dialog-overlay").style.display="none"; if(dialogOkFn) dialogOkFn(); };

// ========== Service Worker登録 ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error:', e));
  });
}

// ========== 起動 ==========
openDB().then(async ()=>{
  DB = await dbGetAll();
  buildCover();
});
</script>
</body>
</html>
